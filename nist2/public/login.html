<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in — NIST AI RMF Policy Scanner</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<header class="app">
  <div class="brand">NIST AI RMF Policy Scanner</div>
  <div class="row"><a href="/"><button class="ghost">Home</button></a></div>
</header>

<div class="loginwrap">
  <div class="card">
    <h1>Sign in</h1>
    <p class="muted">Access your workspace to upload documents and generate policies.</p>
    <label for="u">Username or email</label>
    <input id="u" autocomplete="username" />
    <label for="p">Password</label>
    <input id="p" type="password" autocomplete="current-password" />
    <div style="height:14px"></div>
    <button id="go" style="width:100%">Sign in</button>
    <div id="msg"></div>
  </div>
</div>

<script type="module">
import { api, showMsg, clearMsg } from "/client.js";

const params = new URLSearchParams(location.search);
const next = params.get("next") || "/app.html";
const msg = document.getElementById("msg");

async function login() {
  clearMsg(msg);
  const username = document.getElementById("u").value.trim();
  const password = document.getElementById("p").value;
  if (!username || !password) return showMsg(msg, "Enter your username and password.");
  try {
    const r = await api("/api/login", { method: "POST", body: { username, password } });
    location.href = r.role === "admin" && next === "/app.html" ? "/admin.html" : next;
  } catch (e) {
    showMsg(msg, e.message);
  }
}
document.getElementById("go").onclick = login;
document.getElementById("p").addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
</script>
</body>
</html>
