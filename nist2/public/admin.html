<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin — NIST AI RMF Policy Scanner</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<header class="app">
  <div class="brand">NIST AI RMF Policy Scanner <small>· admin</small></div>
  <div class="row" id="nav"></div>
</header>

<div class="container">
  <div class="card">
    <h2>Create account</h2>
    <div class="row">
      <div style="flex:1; min-width:180px">
        <label for="nu">Username or email</label>
        <input id="nu" autocomplete="off" />
      </div>
      <div style="flex:1; min-width:180px">
        <label for="np">Initial password</label>
        <input id="np" autocomplete="new-password" />
      </div>
      <div style="min-width:130px">
        <label for="nr">Role</label>
        <select id="nr"><option value="user">user</option><option value="admin">admin</option></select>
      </div>
    </div>
    <div style="height:12px"></div>
    <button id="create">Create account</button>
    <div id="createMsg"></div>
  </div>

  <div class="card">
    <h2>Accounts</h2>
    <table id="users"><thead>
      <tr><th>ID</th><th>Username</th><th>Role</th><th>Created</th><th>Actions</th></tr>
    </thead><tbody></tbody></table>
    <div id="usersMsg"></div>
  </div>
</div>

<script type="module">
import { api, whoami, showMsg, clearMsg, escapeHtml } from "/client.js";

const me = await whoami();
if (!me.authenticated) location.href = "/login.html?next=/admin.html";
if (me.role !== "admin") { document.body.innerHTML = "<div class='container'><div class='card'><h2>403 — Administrator role required.</h2><p><a href='/app.html'>Go to your workspace</a></p></div></div>"; throw new Error("not admin"); }

document.getElementById("nav").innerHTML =
  `<a href="/app.html"><button class="ghost">Workspace</button></a>` +
  `<button class="ghost" id="logout">Sign out</button>`;
document.getElementById("logout").onclick = async () => { await api("/api/logout", { method: "POST" }); location.href = "/"; };

async function refresh() {
  const { users } = await api("/api/admin/users");
  const tb = document.querySelector("#users tbody");
  tb.innerHTML = users.map((u) => `
    <tr>
      <td class="muted">${u.id}</td>
      <td>${escapeHtml(u.username)}${u.id===me_id()?' <span class="hint">(you)</span>':''}</td>
      <td><span class="pill ${u.role}">${u.role}</span></td>
      <td class="muted">${new Date(u.created_at*1000).toLocaleDateString()}</td>
      <td class="row">
        <button class="ghost" data-pw="${u.id}">Reset password</button>
        <button class="ghost" data-role="${u.id}" data-cur="${u.role}">Make ${u.role==='admin'?'user':'admin'}</button>
        <button class="danger" data-del="${u.id}" data-name="${escapeHtml(u.username)}">Delete</button>
      </td>
    </tr>`).join("");
  bind();
}
function me_id() { return window.__me_id; }
// fetch own id once via users list match on username
function findMyId(users){ const m = users.find(u=>u.username===me.username); if(m) window.__me_id=m.id; }

function bind() {
  const msg = document.getElementById("usersMsg");
  document.querySelectorAll("[data-pw]").forEach((b) => b.onclick = async () => {
    const pw = prompt("New password for this account:");
    if (!pw) return;
    try { await api("/api/admin/users/" + b.dataset.pw, { method: "PATCH", body: { password: pw } });
      showMsg(msg, "Password updated.", "ok"); } catch (e) { showMsg(msg, e.message); }
  });
  document.querySelectorAll("[data-role]").forEach((b) => b.onclick = async () => {
    const newRole = b.dataset.cur === "admin" ? "user" : "admin";
    try { await api("/api/admin/users/" + b.dataset.role, { method: "PATCH", body: { role: newRole } });
      refresh(); } catch (e) { showMsg(msg, e.message); }
  });
  document.querySelectorAll("[data-del]").forEach((b) => b.onclick = async () => {
    // Confirm before any destructive action.
    if (!confirm(`Delete account "${b.dataset.name}"? This removes the account and its documents. This cannot be undone.`)) return;
    try { await api("/api/admin/users/" + b.dataset.del, { method: "DELETE" });
      showMsg(msg, "Account deleted.", "ok"); refresh(); } catch (e) { showMsg(msg, e.message); }
  });
}

document.getElementById("create").onclick = async () => {
  const msg = document.getElementById("createMsg"); clearMsg(msg);
  const username = document.getElementById("nu").value.trim();
  const password = document.getElementById("np").value;
  const role = document.getElementById("nr").value;
  if (!username || !password) return showMsg(msg, "Username and password required.");
  try {
    await api("/api/admin/users", { method: "POST", body: { username, password, role } });
    showMsg(msg, "Account created.", "ok");
    document.getElementById("nu").value = ""; document.getElementById("np").value = "";
    refresh();
  } catch (e) { showMsg(msg, e.message); }
};

// initial load: get users, set my id, render
const init = await api("/api/admin/users");
findMyId(init.users);
refresh();
</script>
</body>
</html>
